name: CI-Professional-Check
on: [push]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pytest
      - name: Run Pytest
        run: python -m pytest # Robot sẽ tự tìm các file trong thư mục tests/ để chạy